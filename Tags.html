<!-- 
    in this task we learn about tags like bold, italic, underline.
    1. <Strong> :- this tag is used when we need to bold text.
    2. <em>:- this tag is used to for make italic a text.
    3. <u> :- this tag is used for text underlining.
    4. <br>:- this tag is used for break line.
-->



<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>About Tags</title>
  </head>
  <body>
    <h1>My Learning Goals</h1>
    <p>
      I want to become a <strong>Java Developer</strong>.<br />I am learning
      <em>HTML</em>.<br />I will learn <u>CSS</u> next.
    </p>
  </body>
</html>
