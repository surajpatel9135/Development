<!-- 
HTML -> Hiper text markup Language.
-> it desides the structure of web page.
-> in which some tags, headings, div, etc we learn about it later.
-> <> opening tag and <> closing tag.

->here explanation about boilerplate.

-> !DOCTYPE html:- it tell the web browser this Document is html 5.

-> lang="en":- it set the english as a primary language of our whole application.

-> <head> :- This is the brain of our application.
    it consist of title, metadata, info about our page.

-> <meta charset="UTF-8"> :- character encoding declarattion.
    means it tells the web browser to use UTF-8, which is a universal character set of capable 
    of rendering almost every written language.

-> <meta name="viewport" content="width=device-width, initial-scale=1.0">:-
    the responsive design viewport tag.
    It tells the browser to set the width of the webpage to match the screen width of the device 
    (phone, tablet, or desktop) and sets the initial zoom level to 100%. Without this, your 
    site will look like a tiny, unreadable desktop site on a smartphone.

-> <title>Document</title>:-
    it set the title of our web page on search engine.
    it sets the text that appears on the browser tab, in browser history, and as the main headline in search engine results.

-> <body>....</body>:-
    it is used for content of our web page.
    This is where the magic happens. Anything you type between these two tags (headings, paragraphs, images, videos, forms) 
    is what your users will actually see and interact with on your website.

-> here i create a boilerplate of html.
-->


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Syntax</title>
</head>
<body>
    <p>This is the paragraph tag. it is used to write or describe in large paragraph.</p>
    <h1>this is h1 tag.</h1>
    <h2>this is h2 tag.</h2>
    <h3>this is h3 tag.</h3>
    <h4>this is h4 tag.</h4>
    <h5>this is h5 tag.</h5>
    <h6>this is h6 tag.</h6>
</body>
</html>
